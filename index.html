<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberSentinels</title>
    <link rel="stylesheet" href="./css/style.css">
    <a href="./public/pagina1.html"></a>
</head>
<body>

          <!-- Áudio de fundo -->
<audio id="musicaFundo" autoplay loop>
  <source src="./public/sounds/fundo.mp3" type="audio/mpeg">
</audio>

    <!-- Scanlines -->
    <div class="scanlines"></div>

    <!-- Corner decorations -->
    <div class="corner-deco tl"></div>
    <div class="corner-deco tr"></div>
    <div class="corner-deco bl"></div>
    <div class="corner-deco br"></div>

    <!-- Particles -->
    <div class="particles" id="particles"></div>

    <!-- Logo no canto -->
    <nav>
        <div class="nav-logo">Cyber<span>Sentinels</span></div>
        <ul class="nav-links">
        </ul>
        <div class="hamburger" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <!-- Logo -->
        <div class="logo-container">
            <svg class="logo-img" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <radialGradient id="shieldGrad" cx="50%" cy="40%" r="60%">
                        <stop offset="0%" style="stop-color:#1a6eb5;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#0d1b2e;stop-opacity:1" />
                    </radialGradient>
                    <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.9" />
                        <stop offset="100%" style="stop-color:#4db8ff;stop-opacity:0.5" />
                    </linearGradient>
                    <filter id="glow">
                        <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                        <feMerge>
                            <feMergeNode in="coloredBlur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                </defs>

                <!-- Orbit rings -->
                <ellipse cx="100" cy="105" rx="85" ry="30" fill="none"
                    stroke="url(#orbitGrad)" stroke-width="3"
                    stroke-dasharray="15 8" opacity="0.8" filter="url(#glow)"
                    transform="rotate(-25 100 105)">
                    <animateTransform attributeName="transform" type="rotate"
                        from="0 100 105" to="360 100 105" dur="8s" repeatCount="indefinite"/>
                </ellipse>

                <!-- Shield body -->
                <path d="M100 20 L165 55 L165 110 C165 145 135 170 100 185 C65 170 35 145 35 110 L35 55 Z"
                    fill="url(#shieldGrad)" stroke="#1a6eb5" stroke-width="2" filter="url(#glow)"/>

                <!-- Shield highlight -->
                <path d="M100 28 L158 60 L158 110 C158 142 131 165 100 178"
                    fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>

                <!-- Keyhole circle -->
                <circle cx="100" cy="95" r="22" fill="rgba(0,212,255,0.1)"
                    stroke="#00d4ff" stroke-width="2" filter="url(#glow)"/>
                <circle cx="100" cy="90" r="13" fill="#0d1b2e"
                    stroke="#4db8ff" stroke-width="1.5"/>

                <!-- Keyhole slot -->
                <path d="M94 100 L106 100 L103 125 L97 125 Z"
                    fill="#0d1b2e" stroke="#4db8ff" stroke-width="1"/>

                <!-- Inner glow dot -->
                <circle cx="100" cy="90" r="5" fill="#00d4ff" opacity="0.8" filter="url(#glow)"/>
            </svg>
        </div>

        <!-- Title -->
        <div class="title-container">
            <h1 class="main-title" id="mainTitle">CYBERSENTINELS</h1>
            <p class="subtitle">Programando sob pressão, vencendo com precisão</p>
        </div>

 <div class="play-section">
    <!-- Tag de áudio adicionada aqui -->
    <audio id="som-inicio" src="./public/sounds/start.mp3" preload="auto"></audio>

    <button class="play-btn" onclick="handlePlay()">
        <div class="btn-glow-ring"></div>
        <span class="play-icon"></span>
        INICIAR AGORA
    </button>
</div> 

    <!-- Status Bar -->
    <div class="status-bar">
        <div class="status-dot"></div>
        <span>SISTEMA ONLINE — MODO: ATIVO</span>
    </div>

    <script src="./scripts/script1.js"></script>
</body>
</html>
